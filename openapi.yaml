# ─── Response Templates ────────────────────────────────────────────────────────

components:
  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: "Authentication required"
            code: "AUTH_REQUIRED"

    Forbidden:
      description: Insufficient permissions for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: "Insufficient permissions"
            code: "FORBIDDEN"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: "Resource not found"
            code: "NOT_FOUND"

    RateLimitExceeded:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: "Too many requests. Please try again later."
            code: "RATE_LIMIT_EXCEEDED"

tags:
  - name: System
    description: Health and diagnostics
  - name: Authentication
    description: Login, refresh, logout
  - name: Individuals
    description: Personnel records (name, contact, unit assignment)
  - name: Medical History
    description: Visit/consultation records and diagnoses
  - name: Prescriptions
    description: Active medication prescriptions
  - name: Vitals
    description: Physiological measurements (BP, HR, temp, SpO2, etc.)
  - name: Injuries
    description: Injury/trauma incident tracking
  - name: Annual Exams
    description: Annual fitness certification and medical clearance
  - name: Analytics
    description: Aggregated unit-level insights (fitness, disease trends, deployment readiness)
  - name: Admin
    description: User management and audit logs (super_admin only)
